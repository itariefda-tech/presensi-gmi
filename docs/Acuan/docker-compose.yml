      - npm
    networks:
      - hosting_web

  cookiestaro-landing:
    build:
      context: /mnt/ssd/hosting/cookiestaro-landing
      dockerfile: Dockerfile
    container_name: cookiestaro-landing
    restart: unless-stopped
    environment:
      TZ: Asia/Jakarta
      PORT: "6012"
    expose:
      - "6012"
    ports:
      - "6012:6012"  # LAN access juga
    networks:
      - hosting_web

  # =======================================================
  # NEW APP: gajiku-app (BARU) - jangan sentuh ngajiku yang lama
