    restart: unless-stopped
    command: >
      tunnel --no-autoupdate run
      --token "eyJhIjoiZjlmMTU0YzMyZDI0NDYyZTU2MmFmNWMwY2JlZjBkZTkiLCJ0IjoiYWI4NTZmZWUtZWUzNy00YzgwLTlmN2MtOWM4NzI0NTY0M2M2IiwicyI6Ik5qZGhNMkV3TkRndE1HTXlaQzAwWmpOakxXRTNZMlF0T1RnMll6VXlZVGN5WTJFMCJ9"
