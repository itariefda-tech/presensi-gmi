<!doctype html>
<html lang="id" data-theme="{{ theme|default('silver_line') }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ (hris_brand_title or "HRIS PRO") }} - Workforce Control</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v={{ boot_id|default('') }}" />
  {% block head_extra %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  <script>
    window.__GMI_INITIAL_THEME = "{{ theme|default('silver_line') }}";
    window.__GMI_ENABLED_THEMES = {{ enabled_theme_options|default(['dark','light','sage_calm','silver_line','noir_warm'])|tojson }};
    window.__GMI_ENABLED_EXTRA_THEMES = {{ enabled_extra_themes|default(['sage_calm','silver_line','noir_warm'])|tojson }};
    window.__GMI_BOOT_ID = "{{ boot_id|default('') }}";
    window.__GMI_CSRF_TOKEN = "{{ csrf_token|default('') }}";
  </script>
  <script src="{{ url_for('static', filename='js/i18n.js') }}?v={{ boot_id|default('') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}?v={{ boot_id|default('') }}"></script>
</body>
</html>
