{% extends "dashboard/base.html" %}
{% set active = "approvals" %}
{% set heading = "Approvals" %}
{% set subtitle = "Approve leave requests" %}

{% block body %}
<div class="card">
  <div class="tabs">
    <button class="tab-btn active" data-tab="leave">Leave Requests</button>
  </div>

  <div class="tab-panel active" id="tab-leave">
    <div id="approvalAlert" class="alert info" style="display:none;"></div>
    <div class="table-wrap">
      <table class="table" aria-label="Leave pending">
        <thead>
          <tr>
            <th>Diajukan</th>
            <th>Pegawai</th>
            <th>Tipe</th>
            <th>Tanggal</th>
            <th>Alasan</th>
            <th>Status</th>
            {% if can_approve_leave %}<th>Aksi</th>{% endif %}
          </tr>
        </thead>
        <tbody id="leaveRows" data-can-approve-leave="{{ '1' if can_approve_leave else '0' }}">
          <tr><td colspan="{% if can_approve_leave %}7{% else %}6{% endif %}" class="muted">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  </div>
  <script src="{{ url_for('static', filename='js/dashboard_admin.js') }}"></script>
{% endblock %}
