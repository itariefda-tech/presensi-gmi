<!doctype html>
<html lang="id" data-theme="{{ theme|default('silver_line') }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password - HRIS PRO</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v={{ boot_id|default('') }}" />
</head>
<body>
  <div class="shell">
    <main class="auth" aria-label="Reset password">
      <section class="card" aria-label="Form reset password">
        <div class="topbar">
          <div class="logo">
            <div class="mark" aria-hidden="true">
              <img src="/static/img/gmi_logo.gif" alt="" />
            </div>
            <div>
              <h1>HRIS PRO</h1>
              <div class="clock">Reset Password</div>
            </div>
          </div>
        </div>
        <form id="resetPasswordForm" class="tall-fields" autocomplete="off">
          <div class="field">
            <input id="resetToken" name="token" type="text" placeholder="Token reset" value="{{ token }}" required />
          </div>
          <div class="field">
            <input id="newPassword" name="new_password" type="password" placeholder="Password baru" required />
          </div>
          <div class="field">
            <input id="newPassword2" name="new_password2" type="password" placeholder="Ulangi password baru" required />
          </div>
          <div class="btn-grid">
            <button class="btn" type="submit">Simpan Password</button>
            <a class="btn secondary" href="{{ url_for('index') }}">Kembali</a>
          </div>
          <div class="toast" id="resetPasswordToast" aria-live="polite"></div>
        </form>
      </section>
    </main>
  </div>
  <script>
    const form = document.getElementById("resetPasswordForm");
    const toast = document.getElementById("resetPasswordToast");
    function showToast(message, ok) {
      toast.textContent = message;
      toast.classList.toggle("ok", Boolean(ok));
      toast.classList.toggle("err", !ok);
    }
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = {
        token: document.getElementById("resetToken").value.trim(),
        new_password: document.getElementById("newPassword").value,
        new_password2: document.getElementById("newPassword2").value,
      };
      try {
        const response = await fetch("{{ url_for('reset_password') }}", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        showToast(data.message || (response.ok ? "Password diperbarui." : "Reset gagal."), response.ok && data.ok !== false);
        if (response.ok && data.ok !== false) {
          setTimeout(() => { window.location.href = "{{ url_for('index') }}"; }, 1200);
        }
      } catch (err) {
        showToast("Terjadi masalah jaringan.", false);
      }
    });
  </script>
</body>
</html>
